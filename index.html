<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="DOOM (Freedoom) for smart display glasses — 600x600, D-pad controls.">
  <meta name="mrbd-web-app-capable" content="yes">
  <title>DOOM — Glasses</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; background:#000; width:100%; height:100%; overflow:hidden; }
    #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; }
    #canvas { image-rendering:pixelated; width:600px; height:600px; background:#000; display:none; }

    /* Loading screen: title + progress bar (readable on the glasses) */
    #loader { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column;
              align-items:center; justify-content:center; gap:22px; background:#000; }
    #loader.hidden { display:none; }
    #title { color:#e02a2a; font:800 46px/1 ui-monospace,Menlo,monospace; letter-spacing:6px; }
    #bar { width:72%; max-width:440px; height:24px; border:2px solid #666; border-radius:13px;
           overflow:hidden; background:#141414; }
    #barfill { height:100%; width:0%; background:#e02a2a; transition:width .15s linear; }
    #pct { color:#f0f0f0; font:600 22px ui-monospace,monospace; }
    #msg { color:#ff6b6b; font:14px/1.4 ui-monospace,monospace; max-width:82%; text-align:center; min-height:18px; }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="canvas" tabindex="0"></canvas></div>

  <div id="loader">
    <div id="title">DOOM</div>
    <div id="bar"><div id="barfill"></div></div>
    <div id="pct">Loading engine…</div>
    <div id="msg"></div>
  </div>

  <!-- ===== Control adapter (band input → DOOM). No on-screen UI. ===== -->
  <script>
  (function () {
    // Engine keys for the bundled prebuilt DOOM (tune if needed).
    const CONTROLS = {
      FIRE: { key: 'Control', code: 'ControlLeft', keyCode: 17 },
      USE:  { key: ' ',       code: 'Space',       keyCode: 32 },
      MENU: { key: 'Enter',   code: 'Enter',       keyCode: 13 },
    };
    const canvas = document.getElementById('canvas');
    const targets = () => [canvas, document, window];
    let emitting = false;
    function dispatch(type, s) {
      emitting = true;
      const init = { key:s.key, code:s.code, keyCode:s.keyCode, which:s.keyCode, bubbles:true, cancelable:true, composed:true };
      targets().forEach(t => t.dispatchEvent(new KeyboardEvent(type, init)));
      emitting = false;
    }
    const tap = s => { dispatch('keydown', s); setTimeout(() => dispatch('keyup', s), 70); };
    // The 4 arrows pass straight through to the engine (move/turn). The band's single
    // "select" gesture arrives as key="Unidentified" / keyCode 0 → do menu-select + fire + use.
    function selectAction(){ tap(CONTROLS.MENU); tap(CONTROLS.FIRE); tap(CONTROLS.USE); }
    window.__doom = { tap, selectAction, CONTROLS };
    const isSelect = e => e.key === 'Unidentified' || e.keyCode === 0 || e.key === 'Enter';
    window.addEventListener('keydown', e => { if (emitting) return; if (isSelect(e)) { e.stopImmediatePropagation(); e.preventDefault(); selectAction(); } }, true);
    window.addEventListener('keyup',   e => { if (emitting) return; if (isSelect(e)) { e.stopImmediatePropagation(); e.preventDefault(); } }, true);
  })();
  </script>

  <!-- ===== DOOM engine loader (prebuilt Emscripten ES module + Freedoom IWAD) ===== -->
  <script type="module">
    const bar = document.getElementById('barfill');
    const pctEl = document.getElementById('pct');
    const msgEl = document.getElementById('msg');
    const loader = document.getElementById('loader');
    const setPct = (p, label) => { bar.style.width = p + '%'; pctEl.textContent = label || (p + '%'); };
    const fail = m => { msgEl.textContent = m; };
    window.addEventListener('error', e => fail('ERROR: ' + (e.message || e.filename)));
    window.addEventListener('unhandledrejection', e => fail('ERROR: ' + ((e.reason && e.reason.message) || e.reason)));

    // XHR (not fetch-stream): completes via onload even on flaky keep-alive links that
    // stall a manual ReadableStream reader at the final chunk (the 99%-hang on device).
    function fetchProgress(url){
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'arraybuffer';
        xhr.timeout = 90000;
        xhr.onprogress = e => { const p = e.lengthComputable ? Math.floor(e.loaded / e.total * 100) : Math.min(99, Math.floor(e.loaded / 3e5)); setPct(p, p + '%   ' + (e.loaded/1048576).toFixed(1) + (e.lengthComputable ? '/' + (e.total/1048576).toFixed(1) : '') + ' MB'); };
        xhr.onload = () => { (xhr.status >= 200 && xhr.status < 300) ? resolve(new Uint8Array(xhr.response)) : reject(new Error('HTTP ' + xhr.status)); };
        xhr.onerror = () => reject(new Error('network error'));
        xhr.ontimeout = () => reject(new Error('timeout'));
        xhr.send();
      });
    }

    try {
      setPct(0, 'Loading engine…');
      const { default: Module } = await import('./wasm-doom.js');
      const canvas = document.getElementById('canvas');
      canvas.width = 320; canvas.height = 200;
      const doom = await Module({
        canvas,
        locateFile: p => p.endsWith('.wasm') ? './wasm-doom.wasm' : p,
        print: () => {}, printErr: () => {},
      });
      setPct(0, 'Downloading DOOM…');
      let buf;
      for (let attempt = 1; ; attempt++){
        try { buf = await fetchProgress('./doom1.wad'); break; }
        catch (err){ if (attempt >= 3) throw err; setPct(0, 'Retrying (' + attempt + ')…'); await new Promise(r => setTimeout(r, 800)); }
      }
      const magic = String.fromCharCode(buf[0], buf[1], buf[2], buf[3]);
      if (magic !== 'IWAD' && magic !== 'PWAD') throw new Error('bad WAD magic: ' + magic);
      setPct(100, 'Starting…');
      doom.FS.writeFile('/doom.wad', buf);
      loader.classList.add('hidden');
      canvas.style.display = 'block'; canvas.focus();
      // Boot straight into E1M1 — the band has no menu/Escape gesture, so skip the title menu.
      doom.callMain(['-iwad', 'doom.wad', '-warp', '1', '1', '-skill', '2']);
    } catch (e) {
      setPct(0, 'Failed');
      fail((e && e.message) || String(e));
    }
  </script>
</body>
</html>
