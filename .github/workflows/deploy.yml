name: Deploy DOOM to Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site (prebuilt engine + Freedoom, no compile)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p site
          cp index.html site/
          touch site/.nojekyll

          # Prebuilt DOOM engine (WASM) — vendored from VanIseghemThomas/wasmDOOM.
          # We do NOT modify or recompile the game; we only fetch the built artifacts.
          gh api -H "Accept: application/vnd.github.raw" \
            repos/VanIseghemThomas/wasmDOOM/contents/public/wasm/wasm-doom.js  > site/wasm-doom.js
          gh api -H "Accept: application/vnd.github.raw" \
            repos/VanIseghemThomas/wasmDOOM/contents/public/wasm/wasm-doom.wasm > site/wasm-doom.wasm

          # Freedoom (fully libre IWAD) — pinned release.
          curl -fsSL -o freedoom.zip \
            https://github.com/freedoom/freedoom/releases/download/v0.13.0/freedoom-0.13.0.zip
          unzip -o -q freedoom.zip
          cp "$(find . -name freedoom1.wad | head -1)" site/freedoom1.wad

          echo "=== assembled site ==="; ls -la site
          test -s site/wasm-doom.wasm && test -s site/freedoom1.wad

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
