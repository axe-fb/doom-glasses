<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="DOOM for smart display glasses — head-tracking controls.">
  <meta name="mrbd-web-app-capable" content="yes">
  <title>DOOM — Head Tracking</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; background:#000; width:100%; height:100%; overflow:hidden; }
    #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; }
    #canvas { image-rendering:pixelated; width:600px; height:600px; background:#000; display:none; }
    #loader { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; background:#000; }
    #loader.hidden { display:none; }
    #title { color:#e02a2a; font:800 40px/1 ui-monospace,Menlo,monospace; letter-spacing:4px; text-align:center; }
    #sub { color:#8a8; font:13px ui-monospace,monospace; margin-top:-14px; }
    #bar { width:72%; max-width:440px; height:24px; border:2px solid #666; border-radius:13px; overflow:hidden; background:#141414; }
    #barfill { height:100%; width:0%; background:#e02a2a; transition:width .15s linear; }
    #pct { color:#f0f0f0; font:600 22px ui-monospace,monospace; }
    #msg { color:#ff6b6b; font:14px/1.4 ui-monospace,monospace; max-width:82%; text-align:center; min-height:18px; }
    /* tiny head-tracking HUD */
    #hud { position:fixed; left:8px; top:8px; z-index:30; color:#6f6; font:11px/1.3 ui-monospace,monospace;
           background:#0009; border:1px solid #0f04; border-radius:6px; padding:4px 7px; pointer-events:none; }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="canvas" tabindex="0"></canvas></div>
  <div id="loader">
    <div id="title">DOOM<div id="sub">HEAD TRACKING</div></div>
    <div id="bar"><div id="barfill"></div></div>
    <div id="pct">Loading engine…</div>
    <div id="msg"></div>
  </div>
  <div id="hud">yaw — · turn — · steps 0</div>

  <!-- ===== Head-tracking + walk-in-place + band-fire control layer ===== -->
  <script>
  (function () {
    const canvas = document.getElementById('canvas');
    const hud = document.getElementById('hud');
    const targets = () => [canvas, document, window];
    let emitting = false;
    function ev(type, s){ emitting = true; const i = { key:s.key, code:s.code, keyCode:s.keyCode, which:s.keyCode, bubbles:true, cancelable:true, composed:true }; targets().forEach(t => t.dispatchEvent(new KeyboardEvent(type, i))); emitting = false; }
    const held = new Set();
    const down = s => { if (!held.has(s.keyCode)){ held.add(s.keyCode); ev('keydown', s); } };
    const up   = s => { if (held.has(s.keyCode)){ held.delete(s.keyCode); ev('keyup', s); } };
    const tap  = s => { ev('keydown', s); setTimeout(() => ev('keyup', s), 70); };
    const LEFT={key:'ArrowLeft',code:'ArrowLeft',keyCode:37}, RIGHT={key:'ArrowRight',code:'ArrowRight',keyCode:39}, FWD={key:'ArrowUp',code:'ArrowUp',keyCode:38};
    const FIRE={key:'Control',code:'ControlLeft',keyCode:17}, USE={key:' ',code:'Space',keyCode:32}, MENU={key:'Enter',code:'Enter',keyCode:13};

    // ---- Head as a joystick: yaw offset from a calibrated center → turn L/R ----
    const DEAD = 7;            // degrees of deadzone
    let centerYaw = null, yaw = 0, turning = 0;
    const shortest = a => { a %= 360; if (a > 180) a -= 360; if (a < -180) a += 360; return a; };
    function onOrient(e){
      if (e.alpha == null) return;
      yaw = e.alpha;
      if (centerYaw == null) centerYaw = yaw;         // calibrate on first reading
      const off = shortest(yaw - centerYaw);
      let t = 0; if (off > DEAD) t = 1; else if (off < -DEAD) t = -1;
      if (t !== turning){ up(LEFT); up(RIGHT); if (t > 0) down(RIGHT); else if (t < 0) down(LEFT); turning = t; }
      state.yaw = Math.round(yaw); state.off = Math.round(off); state.turning = t; render();
    }

    // ---- Walk in place: accelerometer step detection → move forward ----
    const STEP_THR = 12; let lastMag = 0, lastStep = 0, stopTimer = null;
    function onMotion(e){
      const a = e.accelerationIncludingGravity || e.acceleration; if (!a || a.x == null) return;
      const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z); const now = Date.now();
      if (lastMag < STEP_THR && mag >= STEP_THR && now - lastStep > 250){
        state.steps++; lastStep = now; down(FWD);
        clearTimeout(stopTimer); stopTimer = setTimeout(() => up(FWD), 650);   // keep moving while stepping
        render();
      }
      lastMag = mag;
    }

    // ---- Fire: band pinch arrives as Unidentified / keyCode 0 (Enter for desktop) ----
    const isSelect = e => e.key === 'Unidentified' || e.keyCode === 0 || e.key === 'Enter';
    window.addEventListener('keydown', e => { if (emitting) return; if (isSelect(e)){ e.stopImmediatePropagation(); e.preventDefault(); tap(MENU); tap(FIRE); tap(USE); } }, true);
    window.addEventListener('keyup',   e => { if (emitting) return; if (isSelect(e)){ e.stopImmediatePropagation(); e.preventDefault(); } }, true);

    const state = { yaw:0, off:0, turning:0, steps:0 };
    function render(){ hud.textContent = 'yaw ' + state.yaw + '° · off ' + state.off + '° · turn ' + (state.turning>0?'R':state.turning<0?'L':'–') + ' · steps ' + state.steps; }
    async function startSensors(){
      try {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') await DeviceOrientationEvent.requestPermission();
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
      } catch (e) {}
      window.addEventListener('deviceorientation', onOrient);
      window.addEventListener('devicemotion', onMotion);
    }
    // Expose for CDP-mock testing + on-device recenter.
    window.__motion = { state, recenter: () => { centerYaw = yaw; }, start: startSensors, feedYaw: a => onOrient({ alpha:a }) };
    startSensors();                                   // desktop: no permission gate
    window.addEventListener('pointerdown', startSensors, { once:true });   // device: user-gesture grant
  })();
  </script>

  <!-- ===== DOOM engine loader (prebuilt Emscripten ES module + shareware WAD) ===== -->
  <script type="module">
    const bar = document.getElementById('barfill'), pctEl = document.getElementById('pct'), msgEl = document.getElementById('msg'), loader = document.getElementById('loader');
    const setPct = (p, label) => { bar.style.width = p + '%'; pctEl.textContent = label || (p + '%'); };
    window.addEventListener('error', e => { msgEl.textContent = 'ERROR: ' + (e.message || e.filename); });
    async function fetchProgress(url){
      const resp = await fetch(url); if (!resp.ok) throw new Error('HTTP ' + resp.status + ' for ' + url);
      const total = +(resp.headers.get('content-length') || 0);
      if (!resp.body || !resp.body.getReader) return new Uint8Array(await resp.arrayBuffer());
      const reader = resp.body.getReader(); let received = 0; const chunks = []; let last = -1;
      for (;;){ const { done, value } = await reader.read(); if (done) break; chunks.push(value); received += value.length;
        const p = total ? Math.floor(received / total * 100) : Math.min(99, Math.floor(received / 3e5));
        if (p !== last){ last = p; setPct(p, p + '%   ' + (received/1048576).toFixed(1) + (total ? '/' + (total/1048576).toFixed(1) : '') + ' MB'); } }
      const out = new Uint8Array(received); let pos = 0; for (const c of chunks){ out.set(c, pos); pos += c.length; } return out;
    }
    try {
      setPct(0, 'Loading engine…');
      const { default: Module } = await import('./wasm-doom.js');
      const canvas = document.getElementById('canvas'); canvas.width = 320; canvas.height = 200;
      const doom = await Module({ canvas, locateFile: p => p.endsWith('.wasm') ? './wasm-doom.wasm' : p, print: () => {}, printErr: () => {} });
      setPct(0, 'Downloading DOOM…');
      const buf = await fetchProgress('./doom1.wad');
      const magic = String.fromCharCode(buf[0], buf[1], buf[2], buf[3]);
      if (magic !== 'IWAD' && magic !== 'PWAD') throw new Error('bad WAD magic: ' + magic);
      setPct(100, 'Starting…'); doom.FS.writeFile('/doom.wad', buf);
      loader.classList.add('hidden'); canvas.style.display = 'block'; canvas.focus();
      doom.callMain(['-iwad', 'doom.wad', '-warp', '1', '1', '-skill', '2']);
    } catch (e) { setPct(0, 'Failed'); msgEl.textContent = (e && e.message) || String(e); }
  </script>
</body>
</html>
